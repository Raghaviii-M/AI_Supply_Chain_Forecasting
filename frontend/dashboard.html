<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChainSight AI | Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="font-sans">

<!-- FIX: shared.js loaded AFTER body, not in <head>, so renderLayout can write to body -->
<script src="shared.js"></script>
<script>
(async () => {
  /* ── Default fallback data ── */
  let stats = {};
  
  let acts = [];
  /* FIX: correct endpoint — no /api/ prefix on the FastAPI routes we built */
  let top3 = [
    { product_name: "Laptop",      total_quantity: 410 },
    { product_name: "Smart Watch", total_quantity: 390 },
    { product_name: "Headphones",  total_quantity: 330 },
  ];

  /* ── Live API calls (graceful fallback if backend is offline) ── */
  try {
  const res = await fetch(`${API}/dashboard-metrics`);
  if (res.ok) {
    stats = await res.json();
  }
} catch (e) {
  console.log("Using fallback dashboard data");
}
acts = stats.recent_activities?.length ? stats.recent_activities : [
    { action: "Dataset uploaded",     time: "2 hours ago"  },
    { action: "Prediction completed", time: "5 hours ago"  },
    { action: "Report generated",     time: "1 day ago"    },
  ];
  try {
    const r = await fetch(`${API}/top-products`);
    if (r.ok) { const d = await r.json(); if (d.top_products?.length) top3 = d.top_products; }
  } catch {}

  const medals   = ["🥇","🥈","🥉"];
  const catColors = ["#3b82f6","#8b5cf6","#f59e0b","#10b981"];

  /* Top-products rows */
  const topRows = top3.map((p, i) => `
    <div class="flex items-center justify-between py-3 border-b border-gray-50 last:border-0
                hover:bg-gray-50 rounded-lg px-2 transition-colors">
      <div class="flex items-center gap-3">
        <span class="text-xl">${medals[i] || "🏅"}</span>
        <span class="text-sm font-medium text-gray-700">${p.product_name}</span>
      </div>
      <span class="text-sm font-bold text-gray-800 bg-blue-50 px-3 py-1 rounded-full">
        ${Number(p.total_quantity ?? p.predicted_demand ?? 0).toLocaleString()} Units
      </span>
    </div>`).join("");

  /* Activity rows */
  const actRows = acts.map(a => `
    <div class="flex items-start gap-3 py-3 border-b border-gray-50 last:border-0">
      <span class="mt-0.5 text-base w-7 h-7 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">📋</span>
      <div class="flex-1">
        <p class="text-sm font-medium text-gray-700">${a.action}</p>
        <p class="text-xs text-gray-400 mt-0.5">${a.time}</p>
      </div>
    </div>`).join("");

  /* Demand trend (last 6 months of real months) */
  const trend = stats.demand_trend?.length ? stats.demand_trend : [
    { month: "Jan", demand: 7200 }, { month: "Feb", demand: 7800 },
    { month: "Mar", demand: 8100 }, { month: "Apr", demand: 7950 },
    { month: "May", demand: 8600 }, { month: "Jun", demand: 8950 },
  ];

  const cats = stats.categories?.length ? stats.categories : [
    { name: "Electronics", value: 35 },
    { name: "Apparel",     value: 25 },
    { name: "Food",        value: 22 },
    { name: "Other",       value: 18 },
  ];

  const catRows = cats.map((c, i) => `
    <div class="flex items-center gap-2 text-sm py-1">
      <span class="w-3 h-3 rounded-full flex-shrink-0" style="background:${catColors[i % catColors.length]}"></span>
      <span class="text-gray-600 flex-1">${c.name}</span>
      <span class="font-semibold text-gray-700">${c.value}%</span>
    </div>`).join("");

  /* ── Build page content string ── */
  const content = `
    <div class="space-y-6">

      <!-- Hero Banner -->
      <div class="bg-gradient-to-r from-slate-900 via-blue-900 to-blue-700 rounded-3xl p-7 text-white shadow-xl">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
          <div>
            <p class="text-blue-300 text-xs font-semibold uppercase tracking-widest mb-1">Supply Chain Intelligence</p>
            <h1 class="text-2xl font-extrabold mb-1">Good to see you back, Admin 👋</h1>
            <p class="text-blue-200 text-sm">Here's what the AI engine has for you today.</p>
          </div>
          <div class="flex items-center gap-4 text-sm">
            <div class="bg-white/10 rounded-xl px-4 py-3 text-center">
              <div class="text-2xl font-bold">92%</div>
              <div class="text-blue-200 text-xs mt-0.5">Forecast Accuracy</div>
            </div>
            <div class="bg-white/10 rounded-xl px-4 py-3 text-center">
              <div class="text-2xl font-bold">Online</div>
              <div class="text-blue-200 text-xs mt-0.5">AI Engine Status</div>
            </div>
          </div>
        </div>
      </div>

      <!-- KPI Cards -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 stagger">
        ${statCard("📦", "Total Products",   stats.total_products,   "blue")}
        ${statCard("✅", "Available Stock",  stats.available_stock,  "green")}
        ${statCard("🛒", "Total Orders",     stats.total_orders,     "purple")}
        ${statCard("📊", "Predicted Demand", stats.predicted_demand, "orange")}
      </div>

      <!-- Charts row -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-bold text-gray-800">🏆 Top 3 High-Demand Products</h2>
            <a href="top_product.html"
               class="text-xs text-blue-600 hover:underline font-medium">View all →</a>
          </div>
          ${topRows}
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <h2 class="font-bold text-gray-800 mb-4">📈 Demand Overview (Last 6 Months)</h2>
          <canvas id="trendChart" height="120"></canvas>
        </div>
      </div>

      <!-- Bottom row -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <h2 class="font-bold text-gray-800 mb-4">🧩 Category Distribution</h2>
          <div class="flex gap-6 items-center">
            <div class="flex-shrink-0 w-24 h-24"><canvas id="pieChart" width="90" height="90"></canvas></div>
            <div class="space-y-2 flex-1">${catRows}</div>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <h2 class="font-bold text-gray-800 mb-4">🕐 Recent Activities</h2>
          ${actRows}
        </div>
      </div>

      <!-- Quick-action buttons -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <a href="upload.html"    class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-3 rounded-xl text-center transition-all hover:scale-105">📤 Upload Data</a>
        <a href="predict.html"   class="bg-cyan-600  hover:bg-cyan-700  text-white text-sm font-semibold py-3 rounded-xl text-center transition-all hover:scale-105">🤖 Run Forecast</a>
        <a href="inventory.html" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-3 rounded-xl text-center transition-all hover:scale-105">📦 Inventory</a>
        <a href="reports.html"   class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold py-3 rounded-xl text-center transition-all hover:scale-105">📊 Reports</a>
      </div>

    </div>`;

  /* FIX: renderLayout FIRST so canvas elements exist in the DOM before Chart.js runs */
  renderLayout("dashboard", "Dashboard", content);

  /* ── Demand trend line chart ── */
  new Chart(document.getElementById("trendChart"), {
    type: "line",
    data: {
      labels: trend.map(t => t.month),
      datasets: [{
        data: trend.map(t => t.demand),
        borderColor: "#3b82f6",
        backgroundColor: "rgba(59,130,246,0.08)",
        tension: 0.4, pointRadius: 5, pointHoverRadius: 7,
        fill: true, borderWidth: 2,
      }],
    },
    options: {
      responsive: true,
      animation: { duration: 1000, easing: "easeOutQuart" },
      plugins: { legend: { display: false }, tooltip: { mode: "index", intersect: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: "#f3f4f6" }, ticks: { font: { size: 11 } } },
      },
    },
  });

  /* ── Category doughnut ── */
  new Chart(document.getElementById("pieChart"), {
    type: "doughnut",
    data: {
      labels: cats.map(c => c.name),
      datasets: [{
        data: cats.map(c => c.value),
        backgroundColor: catColors,
        borderWidth: 0, hoverOffset: 6,
      }],
    },
    options: {
      animation: { animateRotate: true, duration: 1000 },
      plugins: { legend: { display: false } },
      cutout: "68%",
    },
  });
})();
</script>
</body>
</html>
