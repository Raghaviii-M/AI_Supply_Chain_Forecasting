<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChainSight AI | Forecast Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="font-sans">
<script src="shared.js"></script>
<script>
const result    = JSON.parse(localStorage.getItem("predictionResult") || "{}");
const riskScore = Math.min(100, Math.max(0, Number(result.risk_score) || 50));

/* Risk colour helper */
function riskColor(score) {
  if (score >= 65) return "text-red-600 bg-red-50 border-red-200";
  if (score >= 40) return "text-orange-600 bg-orange-50 border-orange-200";
  return "text-green-600 bg-green-50 border-green-200";
}

const content = `
<div class="space-y-6">

  <!-- Hero -->
  <div class="bg-gradient-to-r from-blue-700 to-cyan-600 rounded-3xl p-8 text-white shadow-xl">
    <div class="flex flex-col lg:flex-row justify-between items-center gap-6">
      <div>
        <p class="text-blue-200 text-xs font-semibold uppercase tracking-widest mb-1">
          Analysis Complete
        </p>
        <h1 class="text-3xl font-extrabold mb-2">AI Forecast Results</h1>
        <p class="text-blue-100 text-sm">
          Demand prediction, inventory risk assessment, and AI recommendations are ready.
        </p>
      </div>
      <div class="text-7xl float">🤖</div>
    </div>
  </div>

  <!-- Summary strip -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
    <h2 class="font-bold text-gray-700 text-sm uppercase tracking-widest mb-4">Forecast Summary</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
      <div>
        <p class="text-gray-400 text-xs mb-1">Product</p>
        <p class="font-semibold text-gray-800">${result.product_name || "N/A"}</p>
      </div>
      <div>
        <p class="text-gray-400 text-xs mb-1">Month</p>
        <p class="font-semibold text-gray-800">${result.month_name || (result.forecast_days + " Days") || "N/A"}</p>
      </div>
      <div>
        <p class="text-gray-400 text-xs mb-1">ML Model</p>
        <p class="font-semibold text-gray-800">${result.model_used || "Random Forest"}</p>
      </div>
      <div>
        <p class="text-gray-400 text-xs mb-1">Analysis Date</p>
        <p class="font-semibold text-gray-800">${result.prediction_date || "—"}</p>
      </div>
    </div>
  </div>

  <!-- Metric cards -->
  <div class="grid grid-cols-2 xl:grid-cols-5 gap-4 stagger">
    <div class="bg-blue-50 rounded-2xl p-5 col-span-1">
      <p class="text-xs text-blue-500 font-semibold uppercase tracking-wider mb-1">Predicted Demand</p>
      <p class="text-3xl font-extrabold text-blue-800">${Number(result.predicted_demand || 0).toLocaleString()}</p>
      <p class="text-xs text-blue-400 mt-1">Units</p>
    </div>
    <div class="bg-green-50 rounded-2xl p-5">
      <p class="text-xs text-green-500 font-semibold uppercase tracking-wider mb-1">Confidence</p>
      <p class="text-3xl font-extrabold text-green-800">${result.confidence_score || "--"}%</p>
    </div>
    <div class="bg-purple-50 rounded-2xl p-5">
      <p class="text-xs text-purple-500 font-semibold uppercase tracking-wider mb-1">Model</p>
      <p class="text-lg font-extrabold text-purple-800 leading-tight">${result.model_used || "Random Forest"}</p>
    </div>
    <div class="bg-orange-50 rounded-2xl p-5">
      <p class="text-xs text-orange-500 font-semibold uppercase tracking-wider mb-1">Risk Level</p>
      <p class="text-2xl font-extrabold text-orange-700">${result.risk_level || "Medium"}</p>
    </div>
    <div class="bg-cyan-50 rounded-2xl p-5">
      <p class="text-xs text-cyan-500 font-semibold uppercase tracking-wider mb-1">Current Stock</p>
      <p class="text-2xl font-extrabold text-cyan-700">${Number(result.stock_level || 0).toLocaleString()}</p>
    </div>
  </div>

  <!-- AI Decision + Recommendation -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
      <div class="flex items-center gap-3 mb-4">
        <span class="text-3xl">🧠</span>
        <h2 class="font-bold text-gray-800">AI Decision Engine</h2>
      </div>
      <div class="bg-blue-50 border border-blue-100 rounded-xl p-4">
        <p class="text-xl font-extrabold text-blue-800 mb-1">
          ${result.ai_decision || "Maintain Stock Levels"}
        </p>
        <p class="text-sm text-blue-600">
          Based on demand analysis, current inventory, and AI forecasting model output.
        </p>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
      <div class="flex items-center gap-3 mb-4">
        <span class="text-3xl">📦</span>
        <h2 class="font-bold text-gray-800">AI Recommendation</h2>
      </div>
      <div class="bg-green-50 border border-green-100 rounded-xl p-4">
        <p class="text-sm text-green-800 leading-relaxed font-medium">
          ${result.recommendation || "Monitor stock levels and prepare for future demand growth."}
        </p>
      </div>
    </div>
  </div>

  <!-- Risk bar -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <div class="flex justify-between items-center mb-3">
      <h2 class="font-bold text-gray-800">⚠️ Inventory Risk Assessment</h2>
      <span class="text-sm font-bold px-3 py-1 rounded-full border ${riskColor(riskScore)}">
        Risk Score: ${riskScore} / 100
      </span>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
      <div class="risk-bar bg-gradient-to-r from-green-500 via-yellow-400 to-red-500 h-4 rounded-full"
           style="width:0%" data-target="${riskScore}%"></div>
    </div>
    <div class="flex justify-between text-xs text-gray-400 mt-2">
      <span>Low Risk</span><span>Medium Risk</span><span>High Risk</span>
    </div>
  </div>

  <!-- Forecast chart -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <div class="flex justify-between items-center mb-5">
      <h2 class="font-bold text-gray-800">📈 Forecast Demand Trend</h2>
      <span class="text-green-600 font-bold text-sm" id="trendBadge"></span>
    </div>
    <canvas id="forecastChart" height="100"></canvas>
  </div>

  <!-- Actions -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <a href="predict.html"
       class="text-center border-2 border-blue-700 text-blue-700 py-3 rounded-xl
              font-semibold hover:bg-blue-50 transition">← New Forecast</a>
    <a href="inventory.html"
       class="text-center bg-blue-700 text-white py-3 rounded-xl font-semibold
              hover:bg-blue-800 transition">Inventory Insights →</a>
    <button onclick="downloadReport()"
      class="bg-gradient-to-r from-blue-700 to-cyan-600 text-white py-3 rounded-xl
             font-semibold hover:scale-105 transition-all">
      📄 Export Report
    </button>
  </div>

</div>`;

/* FIX: render layout BEFORE Chart.js so canvas elements exist in DOM */
renderLayout("predict", "Prediction Results", content);

/* Animate risk bar after DOM paint */
requestAnimationFrame(() => {
  const bar = document.querySelector(".risk-bar[data-target]");
  if (bar) {
    setTimeout(() => { bar.style.width = bar.dataset.target; }, 100);
  }
});

/* Trend badge */
const graph = result.forecast_graph || [];
if (graph.length >= 2) {
  const pct = (((graph.at(-1).demand - graph[0].demand) / graph[0].demand) * 100).toFixed(1);
  const badge = document.getElementById("trendBadge");
  if (badge) {
    badge.textContent = `${pct >= 0 ? "+" : ""}${pct}%`;
    badge.className   = pct >= 0
      ? "text-green-600 font-bold text-sm bg-green-50 px-3 py-1 rounded-full"
      : "text-red-600 font-bold text-sm bg-red-50 px-3 py-1 rounded-full";
  }
}

/* Line chart */
if (graph.length) {
  new Chart(document.getElementById("forecastChart"), {
    type: "line",
    data: {
      labels: graph.map(g => g.date),
      datasets: [{
        label: "Predicted Demand",
        data:  graph.map(g => g.demand),
        borderColor: "#3b82f6",
        backgroundColor: "rgba(59,130,246,0.08)",
        tension: 0.4, pointRadius: 5, pointHoverRadius: 7,
        fill: true, borderWidth: 2,
      }],
    },
    options: {
      responsive: true,
      animation: { duration: 900, easing: "easeOutQuart" },
      plugins: {
        legend: { display: false },
        tooltip: { mode: "index", intersect: false },
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: "#f3f4f6" }, beginAtZero: false, ticks: { font: { size: 11 } } },
      },
    },
  });
}

/* Export report */
function downloadReport() {
  const safeName = (result.product_name || "unknown").replace(/\s+/g, "_");
  const lines = [
    "ChainSight AI — Forecast Intelligence Report",
    "=".repeat(46),
    `Product:          ${result.product_name}`,
    `Month:            ${result.month_name || result.forecast_days + " days"}`,
    `Predicted Demand: ${result.predicted_demand} units`,
    `Confidence Score: ${result.confidence_score}%`,
    `Model:            ${result.model_used}`,
    `Date:             ${result.prediction_date}`,
    `Risk Level:       ${result.risk_level}`,
    `Risk Score:       ${riskScore} / 100`,
    `AI Decision:      ${result.ai_decision}`,
    `Recommendation:   ${result.recommendation}`,
    "", "Forecast Trend:",
    ...(result.forecast_graph || []).map(g => `  ${g.date}: ${g.demand} units`),
  ];
  const a = document.createElement("a");
  a.href     = URL.createObjectURL(new Blob([lines.join("\n")], { type: "text/plain" }));
  a.download = `forecast_${safeName}.txt`;
  a.click();
}
</script>
</body>
</html>
