<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChainSight AI | Executive Analytics Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="shared.js"></script>
</head>
<body class="font-sans">
<script>
const reports = [
  {
    icon:"📅", title:"Monthly Forecast Report",
    desc:"Detailed monthly demand forecast for all products.",
    color:"blue",
    key:"forecast",
  },
  {
    icon:"📈", title:"Demand Trend Analysis",
    desc:"Analysis of demand trends and patterns.",
    color:"green",
    key:"trend",
  },
  {
    icon:"📊", title:"Inventory Report",
    desc:"Current inventory status and recommendations.",
    color:"purple",
    key:"inventory",
  },
];

const colors = {
  blue:   { bg:"bg-blue-50",   icon:"bg-blue-100 text-blue-700",   btn:"bg-blue-700 hover:bg-blue-800" },
  green:  { bg:"bg-green-50",  icon:"bg-green-100 text-green-700", btn:"bg-green-700 hover:bg-green-800" },
  purple: { bg:"bg-purple-50", icon:"bg-purple-100 text-purple-700", btn:"bg-purple-700 hover:bg-purple-800" },
};

const cards = reports.map((r,i) => {
  const c = colors[r.color];
  return `
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col gap-4">
      <div class="${c.bg} rounded-xl p-6 flex justify-center">
        <span class="text-5xl">${r.icon}</span>
      </div>
      <h3 class="font-semibold text-gray-800 text-sm text-center">${r.title}</h3>
      <p class="text-xs text-gray-400 text-center">${r.desc}</p>
      <div class="mt-auto space-y-2">
        <button id="pdf-btn-${i}" onclick="downloadReport(${i},'pdf')"
          class="w-full ${c.btn} text-white text-sm py-2 rounded-lg transition">
          Download PDF
        </button>
        <button id="excel-btn-${i}" onclick="downloadReport(${i},'excel')"
          class="w-full border border-gray-300 hover:bg-gray-50 text-gray-700 text-sm py-2 rounded-lg transition">
          Download Excel
        </button>
      </div>
    </div>`;
}).join("");

const content = `

<div class="space-y-6">

  <!-- Hero Banner -->
  <div class="bg-gradient-to-r from-indigo-700 via-blue-700 to-cyan-600 rounded-3xl p-8 text-white shadow-xl">

    <div class="flex flex-col md:flex-row justify-between items-center gap-6">

      <div>

        <h1 class="text-3xl font-bold mb-2">
          Executive Analytics Center
        </h1>

        <p class="text-blue-100">
          AI-generated business intelligence reports,
          demand forecasting analytics and inventory insights.
        </p>

      </div>

      <div class="text-7xl">
        📊
      </div>

    </div>

  </div>


  <!-- KPI Cards -->

  <div class="grid grid-cols-1 md:grid-cols-4 gap-5">

    ${statCard("📦","Products Analyzed",125,"blue")}

    ${statCard("📈","Forecast Accuracy",92,"green")}

    ${statCard("⚠️","Risk Alerts",12,"orange")}

    ${statCard("🤖","AI Decisions",48,"purple")}

  </div>


  <!-- Executive Summary -->

  <div class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm">

    <div class="flex items-center gap-4">

      <div class="text-5xl">
        🧠
      </div>

      <div>

        <h2 class="text-xl font-bold text-gray-800">
          AI Executive Summary
        </h2>

        <p class="text-gray-600 mt-2">
          Demand forecasting indicates positive growth trends.
          High-demand products require additional inventory planning.
          AI recommends increasing safety stock by 10–15%
          for critical items.
        </p>

      </div>

    </div>

  </div>


  <!-- Report Cards -->

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

    ${cards}

  </div>


  <!-- Analytics Insights -->

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <div class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm">

      <div class="flex items-center gap-3 mb-4">

        <span class="text-3xl">📈</span>

        <h2 class="font-bold text-gray-800">
          Demand Analytics
        </h2>

      </div>

      <ul class="space-y-3 text-sm text-gray-600">

        <li>📊 Forecast demand increased by 18%.</li>

        <li>📦 Top products contribute 62% of sales.</li>

        <li>🚀 Seasonal demand expected next quarter.</li>

      </ul>

    </div>


    <div class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm">

      <div class="flex items-center gap-3 mb-4">

        <span class="text-3xl">🤖</span>

        <h2 class="font-bold text-gray-800">
          AI Recommendations
        </h2>

      </div>

      <ul class="space-y-3 text-sm text-gray-600">

        <li>✅ Increase stock for top-demand products.</li>

        <li>⚠️ Monitor low inventory categories.</li>

        <li>📈 Prepare for future demand growth.</li>

      </ul>

    </div>

  </div>


  <!-- Final Project Summary -->

  <div class="bg-gradient-to-r from-green-600 to-emerald-600 rounded-3xl p-6 text-white shadow-lg">

    <h2 class="text-xl font-bold mb-3">
      Sustainability Impact
    </h2>

    <p class="text-green-100">
      This AI-powered system supports SDG 9 (Industry,
      Innovation & Infrastructure) and SDG 12
      (Responsible Consumption & Production) by
      reducing inventory waste, preventing stockouts
      and improving supply chain efficiency.
    </p>

  </div>

</div>

`;

renderLayout("reports", "Reports & Analytics", content);

async function downloadReport(i, type) {
  const r   = reports[i];
  const fmt = type === "pdf" ? "pdf" : "excel";
  const ext = type === "pdf" ? "pdf" : "xlsx";

  const btnId = type === "pdf" ? `pdf-btn-${i}` : `excel-btn-${i}`;
  const btn   = document.getElementById(btnId);
  const original = btn.textContent;
  btn.disabled  = true;
  btn.textContent = "Generating…";

  try {
    const res = await fetch(`${API}/api/reports/${r.key}/${fmt}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `Request failed (${res.status})`);
    }

    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${r.title.replace(/\s+/g, "_")}.${ext}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);
  } catch (e) {
    alert(`⚠️ Could not generate "${r.title}" (${type.toUpperCase()}).\n\n${e.message}\n\nMake sure a dataset has been uploaded and the backend is reachable.`);
  } finally {
    btn.disabled = false;
    btn.textContent = original;
  }
}
</script>
</body>
</html>
