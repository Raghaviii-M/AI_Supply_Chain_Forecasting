<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChainSight AI | Upload Dataset</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="font-sans">
<script src="shared.js"></script>
<script>
const content = `
<div class="space-y-6">

  <!-- Hero -->
  <div class="bg-gradient-to-r from-blue-700 to-cyan-600 rounded-3xl p-8 text-white shadow-xl">
    <div class="flex flex-col lg:flex-row justify-between items-center gap-6">
      <div>
        <p class="text-blue-200 text-xs font-semibold uppercase tracking-widest mb-1">Data Intelligence</p>
        <h1 class="text-3xl font-extrabold mb-2">Dataset Upload Center</h1>
        <p class="text-blue-100 text-sm leading-relaxed">
          Upload your sales CSV and the AI engine will automatically
          retrain the forecast model and update all predictions.
        </p>
      </div>
      <div class="text-7xl float"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 xl:grid-cols-4 gap-4 stagger">
    ${statCard("📁", "Datasets Uploaded",  12,    "blue")}
    ${statCard("📊", "Records Processed",  24580, "green")}
    ${statCard("🤖", "AI Models Trained",  8,     "purple")}
    ${statCard("🎯", "Data Quality Score", 96,    "orange")}
  </div>

  <!-- Required format info -->
  <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 flex gap-3 items-start">
    <span class="text-2xl">💡</span>
    <div class="text-sm text-amber-800">
      <strong>Flexible AI Format:</strong>
      Any CSV with:
      - A time column (date, time, timestamp, etc.)
      - At least one numeric column (sales, quantity, revenue, etc.)

      AI will auto-detect structure.
      (date format: YYYY-MM-DD, DD-MM-YYYY).
      Once uploaded, the AI model will retrain automatically.
    </div>
  </div>

  <!-- Upload Card -->
  <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-1">Upload Sales Dataset</h2>
    <p class="text-gray-400 text-sm mb-5">CSV file only · Max 10 MB</p>

    <!-- Dropzone -->
    <div id="dropzone"
      class="border-2 border-dashed border-blue-300 rounded-3xl p-12
             bg-gradient-to-br from-blue-50 to-cyan-50
             hover:from-blue-100 hover:to-cyan-100
             transition-all duration-300 flex flex-col items-center justify-center
             cursor-pointer text-center"
      onclick="document.getElementById('fileInput').click()"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="handleDrop(event)">
      <div class="text-7xl mb-4 float">☁️</div>
      <h3 class="font-bold text-blue-800 text-lg">Drag &amp; Drop Dataset</h3>
      <p class="text-gray-400 text-sm mt-2">or click to browse files</p>
      <p class="mt-3 text-xs text-gray-400">CSV · Max 10 MB</p>
    </div>

    <input id="fileInput" type="file" accept=".csv" class="hidden"
           onchange="handleFile(this.files[0])"/>

    <!-- Status -->
    <div id="status" class="hidden mt-4 rounded-xl p-4 text-sm"></div>

    <!-- Progress bar (hidden until upload) -->
    <div id="progress-wrap" class="hidden mt-4">
      <div class="flex justify-between text-xs text-gray-500 mb-1">
        <span>Processing dataset…</span><span id="pct">0%</span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
        <div id="progress-bar"
             class="h-2.5 bg-gradient-to-r from-blue-500 to-cyan-500 rounded-full risk-bar"
             style="width:0%"></div>
      </div>
    </div>

    <!-- Upload button -->
    <button id="uploadBtn" onclick="uploadFile()"
      class="hidden mt-5 w-full bg-gradient-to-r from-blue-700 to-cyan-600 text-white
             py-3.5 rounded-xl font-bold hover:scale-[1.01] transition-all shadow-lg">
      🚀 Upload &amp; Retrain AI Model
    </button>
  </div>

  <!-- AI analysis cards -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
    <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm card-hover">
      <div class="text-3xl mb-3">🤖</div>
      <h3 class="font-bold text-gray-800">AI Validation</h3>
      <p class="text-sm text-gray-500 mt-2">Automatically checks column structure and data quality before training.</p>
    </div>
    <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm card-hover">
      <div class="text-3xl mb-3">📈</div>
      <h3 class="font-bold text-gray-800">Trend Detection</h3>
      <p class="text-sm text-gray-500 mt-2">Identifies seasonal demand patterns and sales trends automatically.</p>
    </div>
    <div class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm card-hover">
      <div class="text-3xl mb-3">📦</div>
      <h3 class="font-bold text-gray-800">Instant Retraining</h3>
      <p class="text-sm text-gray-500 mt-2">New data triggers model retraining — predictions update in seconds.</p>
    </div>
  </div>

  <!-- Preview section -->
  <div id="preview-section" class="hidden bg-white rounded-3xl shadow-sm border border-gray-100 p-6">
    <div class="flex justify-between items-center mb-5">
      <div>
        <h2 class="font-bold text-gray-800">Dataset Preview</h2>
        <p class="text-sm text-gray-400">First 5 rows detected</p>
      </div>
      <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-semibold">✅ Valid Dataset</span>
    </div>
    <div class="overflow-x-auto rounded-xl border border-gray-100">
      <table id="preview-table" class="w-full text-sm">
        <thead class="bg-gray-50 text-gray-500 text-xs uppercase"></thead>
        <tbody class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
    <div class="mt-6 flex justify-end">
      <a href="dashboard.html"
         class="bg-gradient-to-r from-blue-700 to-cyan-600 text-white px-6 py-3
                rounded-xl font-semibold hover:scale-105 transition-all">
        Continue to Dashboard →
      </a>
    </div>
  </div>

</div>`;

renderLayout("upload", "Upload Dataset", content);

/* ────────────────────────────────────────────────── */
let selectedFile = null;

function showStatus(msg, type = "info") {
  const el = document.getElementById("status");
  const styles = {
    info:    "bg-blue-50 border border-blue-200 text-blue-700",
    error:   "bg-red-50 border border-red-200 text-red-700",
    success: "bg-green-50 border border-green-200 text-green-700",
  };
  el.className = `rounded-xl p-4 text-sm ${styles[type]}`;
  el.innerHTML = msg;
  el.classList.remove("hidden");
}

function onDragOver(e) {
  e.preventDefault();
  document.getElementById("dropzone").classList.add("dropzone-active");
}
function onDragLeave(e) {
  document.getElementById("dropzone").classList.remove("dropzone-active");
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById("dropzone").classList.remove("dropzone-active");
  handleFile(e.dataTransfer.files[0]);
}

function handleFile(file) {
  if (!file) return;
  if (!file.name.endsWith(".csv")) {
    showStatus("❌ Please upload a <strong>.csv</strong> file only.", "error"); return;
  }
  if (file.size > 10 * 1024 * 1024) {
    showStatus("❌ File is larger than 10 MB.", "error"); return;
  }
  selectedFile = file;
  showStatus(`📄 <strong>${file.name}</strong> selected — ${(file.size / 1024).toFixed(1)} KB`, "info");
  document.getElementById("uploadBtn").classList.remove("hidden");
}

function animateProgress() {
  const bar  = document.getElementById("progress-bar");
  const pct  = document.getElementById("pct");
  const wrap = document.getElementById("progress-wrap");
  wrap.classList.remove("hidden");
  let v = 0;
  return new Promise(resolve => {
    const t = setInterval(() => {
      v += Math.random() * 12;
      if (v >= 90) { v = 90; clearInterval(t); resolve(); }
      bar.style.width  = v + "%";
      pct.textContent  = Math.round(v) + "%";
    }, 180);
  });
}

async function uploadFile() {
  if (!selectedFile) return;
  const btn = document.getElementById("uploadBtn");
  btn.disabled = true;
  btn.innerHTML = "⏳ Uploading & training…";
  showStatus("🤖 AI Engine is validating and retraining on your dataset…", "info");

  const progressDone = animateProgress();

  const form = new FormData();
  form.append("file", selectedFile);

  try {
    const res  = await fetch(`${API}/upload`, { method: "POST", body: form });
    const data = await res.json();
    await progressDone;
    const bar = document.getElementById("progress-bar");
    const pct = document.getElementById("pct");
    bar.style.width = "100%"; pct.textContent = "100%";

    if (data.success) {
      showStatus(`✅ <strong>${data.message}</strong> — AI model retrained successfully!`, "success");
      renderPreview(data.columns, data.preview);
    } else {
      showStatus(data.detail || "Upload failed.", "error");
    }
  } catch {
    /* Backend offline — parse locally and show preview */
    await progressDone;
    const bar = document.getElementById("progress-bar");
    const pct = document.getElementById("pct");
    bar.style.width = "100%"; pct.textContent = "100%";
    showStatus("✅ File loaded locally (backend offline — showing preview only).", "success");
    parseLocal(selectedFile);
  }

  btn.disabled = false;
  btn.innerHTML = "🚀 Upload &amp; Retrain AI Model";
}

function parseLocal(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const lines   = e.target.result.trim().split("\n");
    const headers = lines[0].split(",").map(h => h.trim());
    const rows    = lines.slice(1, 6).map(l => {
      const vals = l.split(",");
      return Object.fromEntries(headers.map((h, i) => [h, (vals[i] || "").trim()]));
    });
    renderPreview(headers, rows);
  };
  reader.readAsText(file);
}

function renderPreview(columns, rows) {
  const section = document.getElementById("preview-section");
  const table   = document.getElementById("preview-table");
  table.querySelector("thead").innerHTML =
    `<tr>${columns.map(c => `<th class="px-4 py-2 text-left">${c}</th>`).join("")}</tr>`;
  table.querySelector("tbody").innerHTML = rows.map(r =>
    `<tr class="hover:bg-gray-50">${columns.map(c =>
      `<td class="px-4 py-2 text-gray-700">${r[c] ?? ""}</td>`).join("")}</tr>`
  ).join("");
  section.classList.remove("hidden");
  section.scrollIntoView({ behavior: "smooth", block: "start" });
}
</script>
</body>
</html>
